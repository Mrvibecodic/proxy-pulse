<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy PULSE — пульс обновлений</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#0d1117">
<meta name="description" content="Proxy PULSE — живой дашборд обновлений: релизы ядер, панелей, клиентов и коммиты утилит.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Proxy PULSE">
<meta property="og:title" content="Proxy PULSE — пульс обновлений">
<meta property="og:description" content="Релизы и коммиты ваших прокси-инструментов в реальном времени: ядра, панели, клиенты, боты.">
<meta property="og:url" content="https://mrvibecodic.github.io/proxy-pulse/">
<meta property="og:image" content="https://mrvibecodic.github.io/proxy-pulse/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:title" content="Proxy PULSE — пульс обновлений">
<meta name="twitter:description" content="Релизы и коммиты ваших прокси-инструментов в реальном времени.">
<meta name="twitter:image" content="https://mrvibecodic.github.io/proxy-pulse/og-image.png">
<style>
  :root{
    --bg:#0b0f14; --bg2:#0d1117; --panel:#131a22; --panel2:#171f28;
    --border:#243040; --border2:#2f3d50;
    --text:#e6edf3; --muted:#8b97a6; --faint:#5e6b7a;
    --accent:#3fe08a; --accent-dim:#1f6f4a; --accent-soft:rgba(63,224,138,.12);
    --cyan:#39d0d8; --purple:#bc8cff; --amber:#e3a54b; --new:#2f81f7;
    --radius:14px; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:radial-gradient(1200px 500px at 50% -200px,#12212b 0%,var(--bg) 60%);color:var(--text);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px}

  /* Header */
  header{padding:30px 0 10px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:46px;height:46px;flex:none;border-radius:12px;background:var(--bg2);border:1px solid var(--accent-dim);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px -6px var(--accent-soft)}
  .logo svg{width:34px;height:34px;display:block}
  .pulse-path{stroke-dasharray:120;stroke-dashoffset:120;animation:trace 2.6s ease-in-out infinite}
  @keyframes trace{0%{stroke-dashoffset:120}45%{stroke-dashoffset:0}75%{stroke-dashoffset:0;opacity:1}100%{stroke-dashoffset:-120;opacity:.6}}
  h1{margin:0;font-size:23px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:baseline;gap:8px}
  h1 .px{color:var(--accent)}
  .sub{color:var(--muted);font-size:13.5px;margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .live{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-weight:600;font-size:12px}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:beat 1.6s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1);box-shadow:0 0 0 0 var(--accent-soft)}50%{transform:scale(1.25);box-shadow:0 0 0 6px transparent}}

  /* Toolbar */
  .toolbar{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg) 70%,transparent);padding:14px 0 12px;margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .chip{background:var(--panel);color:var(--text);border:1px solid var(--border);padding:7px 13px;border-radius:999px;cursor:pointer;font-size:13px;transition:.15s;white-space:nowrap}
  .chip:hover{border-color:var(--accent-dim);color:#fff}
  .chip.active{background:var(--accent);color:#06210f;border-color:var(--accent);font-weight:700}
  .chip .cnt{opacity:.7;margin-left:4px;font-variant-numeric:tabular-nums}
  .search{flex:1;min-width:170px;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:8px 13px;border-radius:999px;font-size:13px;outline:none}
  .search:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px var(--accent-soft)}
  .ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:8px 12px;border-radius:999px;cursor:pointer;font-size:12.5px}
  .ghost:hover{color:var(--text);border-color:var(--border2)}

  main{padding:6px 0 70px}
  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:26px 0 12px;display:flex;align-items:center;gap:9px}
  .section-title .bar{width:22px;height:2px;border-radius:2px;background:var(--accent);opacity:.8}
  .section-title .cnt{background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:1px 8px;font-size:11px;letter-spacing:0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}

  /* Card */
  .card{background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:.18s}
  .card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 10px 30px -14px rgba(0,0,0,.7)}
  .card.has-new{border-color:var(--accent-dim);box-shadow:0 0 0 1px var(--accent-dim),0 0 26px -12px var(--accent-soft)}
  .card-head{padding:13px 15px 11px;border-bottom:1px solid var(--border);display:flex;gap:11px}
  .avatar{width:38px;height:38px;flex:none;border-radius:9px;background:var(--bg2);border:1px solid var(--border);object-fit:cover}
  .head-main{min-width:0;flex:1}
  .repo-title{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  a.name{color:#fff;text-decoration:none;font-weight:650;font-size:15px;overflow-wrap:anywhere}
  a.name:hover{color:var(--accent)}
  .badge{font-size:10.5px;padding:2px 7px;border-radius:999px;border:1px solid var(--border2);color:var(--muted);white-space:nowrap}
  .badge.new{background:var(--new);color:#fff;border-color:var(--new)}
  .badge.upd{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-dim)}
  .badge.pre{color:var(--amber);border-color:var(--amber)}
  .badge.arch{color:var(--amber);border-color:var(--amber)}
  .badge.def{color:var(--cyan);border-color:#2b5a5e}
  .desc{color:var(--muted);font-size:12.5px;margin:5px 0 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meta-row{display:flex;gap:12px;margin-top:7px;font-size:11.5px;color:var(--faint);flex-wrap:wrap;align-items:center}
  .meta-row .star{color:var(--amber)}
  .meta-row .push{cursor:help;border-bottom:1px dotted var(--faint)}
  .meta-row .lastc{color:var(--cyan);text-decoration:none;border-bottom:1px dotted #2b5a5e}
  .meta-row .lastc:hover{color:#fff}

  /* Tabs */
  .tabs{display:flex;gap:4px;padding:8px 12px 0;overflow-x:auto;scrollbar-width:thin}
  .tabs::-webkit-scrollbar{height:0}
  .tab{background:transparent;border:0;border-bottom:2px solid transparent;color:var(--muted);padding:6px 9px 8px;font-size:12.5px;cursor:pointer;white-space:nowrap;font-family:var(--mono);transition:.15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab .cnt{opacity:.65;margin-left:3px}
  .panes{padding:4px 0 6px}
  .pane{display:none}
  .pane.active{display:block}

  /* Release item */
  .rel{border-top:1px solid #1b2531}
  .rel:first-child{border-top:0}
  .rel>summary{list-style:none;cursor:pointer;padding:9px 15px;display:flex;align-items:center;gap:8px;user-select:none}
  .rel>summary::-webkit-details-marker{display:none}
  .rel>summary:hover{background:rgba(255,255,255,.02)}
  .rel .rname{font-weight:600;font-size:13.5px;color:#fff;overflow-wrap:anywhere}
  .rel .tag{font-family:var(--mono);font-size:11.5px;color:var(--purple)}
  .rel .when{font-size:11px;color:var(--faint);margin-left:auto;white-space:nowrap}
  .rel .chev{transition:.2s;color:var(--faint);flex:none}
  .rel[open] .chev{transform:rotate(90deg)}
  .notes{padding:2px 15px 14px 15px;font-size:12.5px;color:var(--text)}
  .notes .md-h{font-weight:700;margin:10px 0 5px;color:#fff;font-size:12.5px}
  .notes .md-p{margin:5px 0;color:var(--muted)}
  .notes .md-ul{margin:5px 0;padding-left:18px;color:var(--muted)}
  .notes .md-ul li{margin:2px 0}
  .notes code{font-family:var(--mono);background:#0b1017;border:1px solid var(--border);border-radius:5px;padding:.5px 4px;font-size:11.5px}
  .notes .md-code{font-family:var(--mono);background:#0b1017;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:11.5px;overflow-x:auto;white-space:pre;color:var(--muted);margin:7px 0;line-height:1.5}
  .notes a{color:var(--cyan);text-decoration:none;overflow-wrap:anywhere}
  .notes a:hover{text-decoration:underline}
  .notes .empty-note{color:var(--faint)}
  .notes .gh-link{display:inline-block;margin-top:9px;font-size:12px;color:var(--accent)}

  /* Commits */
  .commit{padding:8px 15px;border-top:1px solid #1b2531;font-size:12.5px}
  .commit:first-child{border-top:0}
  .commit a{color:var(--text);text-decoration:none;overflow-wrap:anywhere}
  .commit a:hover{color:var(--accent)}
  .commit .meta{font-size:11px;color:var(--faint);margin-top:2px}
  .commit .sha{font-family:var(--mono);color:var(--muted)}

  .empty{color:var(--faint);font-size:12.5px;padding:12px 15px}
  .loading{text-align:center;padding:70px 20px;color:var(--muted)}

  footer{border-top:1px solid var(--border);color:var(--faint);font-size:12px;text-align:center;padding:22px 20px 40px}
  footer a{color:var(--muted);text-decoration:none}
  footer a:hover{color:var(--accent)}

  @media (max-width:560px){
    .wrap{padding:0 14px}
    .grid{grid-template-columns:1fr}
    h1{font-size:20px}
    .search{min-width:100%;order:5}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 64 40">
          <polyline class="pulse-path" points="4,22 20,22 26,8 34,34 42,14 48,22 60,22" fill="none" stroke="#3fe08a" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <div>
        <h1>Proxy <span class="px">PULSE</span></h1>
        <div class="sub" id="subtitle"><span class="live"><span class="dot"></span>live</span> загрузка данных…</div>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="filters" id="filters">
      <button class="chip active" data-f="all">Все</button>
      <button class="chip" data-f="__new">Только новое</button>
    </div>
    <input class="search" id="search" placeholder="Поиск репозитория…" autocomplete="off">
    <button class="ghost" id="markSeen" title="Сбросить отметки NEW">Прочитано</button>
  </div>

  <main id="app"><div class="loading">Загрузка…</div></main>
</div>

<footer>
  Обновляется автоматически каждые 30 минут через GitHub Actions ·
  <a id="issueLink" href="#" target="_blank" rel="noopener">предложить репозиторий</a>
</footer>

<script>
const LS_KEY="proxy-pulse-seen-v1";
let DATA=null,currentFilter="all",query="",SEEN={};

function loadSeen(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){return{}}}
function saveSeen(o){try{localStorage.setItem(LS_KEY,JSON.stringify(o))}catch(e){}}
function esc(s){return(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

function timeAgo(iso){
  if(!iso)return"";
  const d=new Date(iso),s=Math.floor((Date.now()-d)/1000);
  if(s<60)return"только что";
  const m=Math.floor(s/60);if(m<60)return m+" мин назад";
  const h=Math.floor(m/60);if(h<24)return h+" ч назад";
  const dd=Math.floor(h/24);if(dd<30)return dd+" дн назад";
  const mo=Math.floor(dd/30);if(mo<12)return mo+" мес назад";
  return d.toLocaleDateString("ru-RU");
}

function cleanBody(src){
  if(!src)return"";
  let s=src.replace(/\r/g,"");
  s=s.replace(/<!--[\s\S]*?-->/g,"");
  s=s.replace(/<table[\s\S]*?<\/table>/gi,"");      // таблицы скачивания
  s=s.replace(/<details[\s\S]*?<\/details>/gi,"");
  s=s.replace(/<summary[\s\S]*?<\/summary>/gi,"");
  s=s.replace(/<picture[\s\S]*?<\/picture>/gi,"");
  s=s.replace(/!\[[^\]]*\]\([^)]*\)/g,"");           // markdown-картинки/бейджи
  s=s.replace(/<\/?[a-zA-Z][^>]*>/g,"");             // остальные html-теги
  const lines=s.split("\n"),out=[];let skip=false;
  for(let ln of lines){
    const h=ln.match(/^\s*#{1,6}\s+(.*)$/);
    if(h){skip=/download|assets|скачать|загруз|checksum|sha256|hashes/i.test(h[1]);if(skip)continue;}
    if(skip)continue;
    if(/shields\.io/i.test(ln))continue;                                   // строки-бейджи
    if(/^\s*(download|downloads|скачать|загрузк[аи])\b[^\n]*:\s*$/i.test(ln))continue;
    if(/\|.*(download|\.exe|\.apk|\.zip|\.tar|\.dmg|\.deb|\.rpm|\.msi|releases\/download).*\|/i.test(ln))continue;
    out.push(ln);
  }
  return out.join("\n").replace(/\n{3,}/g,"\n\n").trim();
}
function mdlite(src){
  src=cleanBody(src);
  if(!src||!src.trim())return'<div class="empty-note">Без описания.</div>';
  function inline(t){
    t=esc(t);
    t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
    t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    t=t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    t=t.replace(/(^|[\s(])((https?:\/\/[^\s<)]+))/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
    return t;
  }
  const lines=src.split("\n");
  let out="",inList=false,inCode=false,code=[];
  const flush=()=>{if(inList){out+="</ul>";inList=false;}};
  for(let ln of lines){
    if(/^\s*```/.test(ln)){
      if(inCode){out+='<pre class="md-code">'+code.map(esc).join("\n").replace(/\n{2,}/g,"\n").trim()+'</pre>';code=[];inCode=false;}
      else{flush();inCode=true;}
      continue;
    }
    if(inCode){code.push(ln);continue;}
    let t=ln.replace(/\s+$/,"");
    if(/^\s*`+\s*$/.test(t))continue;              // висячие backtick-строки
    let mH=t.match(/^\s*#{1,6}\s+(.*)$/);
    let mL=t.match(/^\s*[-*]\s+(.*)$/);
    if(mH){flush();out+='<div class="md-h">'+inline(mH[1])+"</div>";continue;}
    if(mL){if(!inList){out+='<ul class="md-ul">';inList=true;}out+="<li>"+inline(mL[1])+"</li>";continue;}
    if(!t.trim()){flush();continue;}
    flush();
    out+='<p class="md-p">'+inline(t)+"</p>";
  }
  if(inCode&&code.length)out+='<pre class="md-code">'+code.map(esc).join("\n").replace(/\n{2,}/g,"\n").trim()+'</pre>';
  flush();
  return out;
}
function relIds(entry){return(entry.releases||[]).map(r=>"rel:"+(r.tag||r.name))}
function comIds(entry){const a=[];(entry.branches||[]).forEach(b=>(b.commits||[]).forEach(c=>a.push("c:"+b.name+":"+c.sha)));return a}
function hasNew(repo,ids,seen){const s=seen[repo]||{};return ids.some(id=>!s[id])}

function avatar(m){
  const src=(m.avatar||("https://github.com/"+(m.owner||"")+".png"))+"&s=76";
  return '<img class="avatar" loading="lazy" src="'+esc(src.replace("?&","?"))+'" alt="" onerror="this.style.visibility=\'hidden\'">';
}

function relItem(r,repo,seen){
  const id="rel:"+(r.tag||r.name);
  const isNew=!(seen[repo]||{})[id];
  return '<details class="rel">'
    +'<summary>'
      +(isNew?'<span class="badge new">NEW</span>':'')
      +'<span class="rname">'+esc(r.name||r.tag||"—")+'</span>'
      +(r.tag&&r.tag!==(r.name||"")?'<span class="tag">'+esc(r.tag)+'</span>':'')
      +'<span class="when">'+timeAgo(r.published_at)+'</span>'
      +'<span class="chev">›</span>'
    +'</summary>'
    +'<div class="notes">'+mdlite(r.body)
      +'<a class="gh-link" href="'+esc(r.url)+'" target="_blank" rel="noopener">Открыть релиз на GitHub ↗</a>'
    +'</div>'
  +'</details>';
}

function releaseBody(entry,seen){
  const repo=entry.repo,rels=entry.releases||[];
  const stable=rels.filter(r=>!r.prerelease),pre=rels.filter(r=>r.prerelease);
  if(!rels.length)return'<div class="empty">Релизов не найдено</div>';
  if(pre.length&&stable.length){
    return '<div class="tabs">'
      +'<button class="tab active" data-i="0">Релизы<span class="cnt">'+stable.length+'</span></button>'
      +'<button class="tab" data-i="1">Пре-релизы<span class="cnt">'+pre.length+'</span></button>'
      +'</div><div class="panes">'
      +'<div class="pane active" data-i="0">'+stable.map(r=>relItem(r,repo,seen)).join("")+'</div>'
      +'<div class="pane active" data-i="1" style="display:none">'+pre.map(r=>relItem(r,repo,seen)).join("")+'</div>'
      +'</div>';
  }
  const list=(stable.length?stable:pre);
  return '<div class="panes"><div class="pane active">'+list.map(r=>relItem(r,repo,seen)).join("")+'</div></div>';
}

function commitsBody(entry,seen,def){
  const repo=entry.repo,raw=entry.branches||[];
  if(!raw.length)return'<div class="empty">Коммитов не найдено</div>';
  const branches=[...raw].sort((a,b)=>(b.name===def?1:0)-(a.name===def?1:0)); // дефолтная ветка первой
  let active=0;
  const tabs=branches.map((b,i)=>'<button class="tab'+(i===active?' active':'')+'" data-i="'+i+'">'
      +(b.name===def?'● ':'')+esc(b.name)+'<span class="cnt">'+b.commits.length+'</span></button>').join("");
  const panes=branches.map((b,i)=>'<div class="pane'+(i===active?' active':'')+'" data-i="'+i+'"'+(i===active?'':' style="display:none"')+'>'
      +b.commits.map(c=>{
        const id="c:"+b.name+":"+c.sha,isNew=!(seen[repo]||{})[id];
        return '<div class="commit">'+(isNew?'<span class="badge new">NEW</span> ':'')
          +'<a href="'+esc(c.url)+'" target="_blank" rel="noopener">'+esc(c.message)+'</a>'
          +'<div class="meta"><span class="sha">'+esc(c.sha)+'</span> · '+esc(c.author||"")+' · '+timeAgo(c.date)+'</div></div>';
      }).join("")
    +'</div>').join("");
  return '<div class="tabs">'+tabs+'</div><div class="panes">'+panes+'</div>';
}

function card(entry,track,seen){
  const m=entry.meta||{},repo=entry.repo;
  const ids=track==="commits"?comIds(entry):relIds(entry);
  const isNew=hasNew(repo,ids,seen);
  const body=track==="commits"?commitsBody(entry,seen,m.default_branch):releaseBody(entry,seen);
  let pushMeta="";
  if(track==="commits"){pushMeta=m.pushed_at?'<span>обновлён '+timeAgo(m.pushed_at)+'</span>':'';}
  else{const lc=entry.last_commit;
    if(lc&&lc.url)pushMeta='<a class="lastc" href="'+esc(lc.url)+'" target="_blank" rel="noopener" title="Последний коммит · ветка '+esc(lc.branch)+'">⤷ '+esc(lc.branch)+' · '+timeAgo(lc.date)+'</a>';
    else if(m.pushed_at)pushMeta='<span>обновлён '+timeAgo(m.pushed_at)+'</span>';}
  return '<div class="card'+(isNew?' has-new':'')+'" data-repo="'+esc(repo)+'">'
    +'<div class="card-head">'+avatar(m)+'<div class="head-main">'
      +'<div class="repo-title"><a class="name" href="'+esc(m.url||("https://github.com/"+repo))+'" target="_blank" rel="noopener">'+esc(entry.title||repo)+'</a>'
        +(isNew?'<span class="badge upd">обновления</span>':'')
        +(m.archived?'<span class="badge arch">архив</span>':'')+'</div>'
      +(m.description?'<div class="desc">'+esc(m.description)+'</div>':'')
      +'<div class="meta-row"><span class="star">★ '+(m.stars==null?"–":m.stars)+'</span><span>'+esc(repo)+'</span>'
        +pushMeta+'</div>'
    +'</div></div>'
    +'<div class="card-body">'+body+'</div>'
  +'</div>';
}

function matches(e){if(!query)return true;return (e.repo+" "+(e.title||"")+" "+((e.meta||{}).description||"")).toLowerCase().includes(query)}

function render(){
  if(!DATA)return;
  const seen=SEEN;let html="";
  for(const g of DATA.groups){
    if(currentFilter!=="all"&&currentFilter!=="__new"&&currentFilter!==g.id)continue;
    const repos=[...g.repos].sort((a,b)=>(b.repo.toLowerCase().startsWith("mrvibecodic/")?1:0)-(a.repo.toLowerCase().startsWith("mrvibecodic/")?1:0));
    const cards=repos.filter(matches).map(e=>{
      const isNew=hasNew(e.repo,g.track==="commits"?comIds(e):relIds(e),seen);
      if(currentFilter==="__new"&&!isNew)return"";
      return card(e,g.track,seen);
    }).filter(Boolean);
    if(cards.length){
      const label=g.track==="commits"?"коммиты по веткам":"релизы";
      html+='<div class="section-title"><span class="bar"></span>'+esc(g.name)+' — '+label+'<span class="cnt">'+cards.length+'</span></div><div class="grid">'+cards.join("")+'</div>';
    }
  }
  document.getElementById("app").innerHTML=html||'<div class="loading">Ничего не найдено.</div>';
}

function allIds(){const m={};for(const g of DATA.groups)for(const e of g.repos){m[e.repo]=m[e.repo]||{};(g.track==="commits"?comIds(e):relIds(e)).forEach(id=>m[e.repo][id]=true)}return m;}
function markAllSeen(){if(!DATA)return;SEEN=allIds();saveSeen(SEEN);render();}

function buildFilters(){
  const w=document.getElementById("filters");
  let f='<button class="chip active" data-f="all">Все</button>';
  for(const g of DATA.groups)f+='<button class="chip" data-f="'+esc(g.id)+'">'+esc(g.name)+'<span class="cnt">'+g.repos.length+'</span></button>';
  f+='<button class="chip" data-f="__new">Только новое</button>';
  w.innerHTML=f;
  w.addEventListener("click",e=>{const b=e.target.closest(".chip");if(!b)return;
    w.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));b.classList.add("active");
    currentFilter=b.dataset.f;render();});
}

// делегирование кликов по вкладкам (ветки / пре-релизы)
document.getElementById("app").addEventListener("click",e=>{
  const tab=e.target.closest(".tab");if(!tab)return;
  const card=tab.closest(".card-body");if(!card)return;
  const i=tab.dataset.i;
  card.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.i===i));
  card.querySelectorAll(".pane").forEach(x=>{const on=x.dataset.i===i;x.classList.toggle("active",on);x.style.display=on?"":"none";});
});

async function init(){
  try{
    const host=location.hostname,user=host.split(".")[0];
    const repoName=location.pathname.split("/").filter(Boolean)[0]||(user+".github.io");
    document.getElementById("issueLink").href="https://github.com/"+user+"/"+repoName+"/issues/new?template=add-repo.yml";
  }catch(e){}
  try{
    const res=await fetch("data.json?_="+Date.now());
    if(!res.ok)throw new Error("data.json HTTP "+res.status);
    DATA=await res.json();
  }catch(e){
    document.getElementById("app").innerHTML='<div class="loading">Не удалось загрузить data.json.<br><small>'+esc(e.message)+'</small></div>';
    document.getElementById("subtitle").innerHTML='<span class="live"><span class="dot"></span>live</span> данные ещё не собраны';return;
  }
  const when=DATA.generated_at?new Date(DATA.generated_at):null;
  const total=DATA.groups.reduce((n,g)=>n+g.repos.length,0);
  document.getElementById("subtitle").innerHTML='<span class="live"><span class="dot"></span>live</span> '+total+' репозиториев · '+DATA.groups.length+' групп · '+(when?when.toLocaleString("ru-RU"):"—");
  SEEN=loadSeen();
  buildFilters();
  document.getElementById("search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
  document.getElementById("markSeen").addEventListener("click",markAllSeen);
  render();
  saveSeen(allIds()); // фиксируем текущее состояние как базу для следующего визита
}
init();
</script>
</body>
</html>
